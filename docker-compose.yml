version: '3.8'

services:
  db:
    image: postgres:16
    container_name: transitops-db
    restart: always
    environment:
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - transitops_pgdata:/var/lib/postgresql/data

volumes:
  transitops_pgdata:
